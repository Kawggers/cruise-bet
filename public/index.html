<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cruise Word Bet 🚢</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #e6edf3; --muted: #7d8590; --accent: #f0c040;
    --green: #3fb950; --green-dim: rgba(63,185,80,0.15);
    --red: #f85149; --red-dim: rgba(248,81,73,0.15);
    --blue: #58a6ff; --blue-dim: rgba(88,166,255,0.12);
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .logo span { color: var(--accent); }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .conn-badge { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .container { max-width: 760px; margin: 0 auto; padding: 24px 16px 60px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface); border-radius: var(--radius); padding: 4px; border: 1px solid var(--border); }
  .tab { flex: 1; padding: 8px 4px; border: none; background: transparent; color: var(--muted); font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; transition: all .15s; }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active { background: var(--accent); color: #0d1117; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }
  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 5px; }
  input[type=text], input[type=number], select { width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; outline: none; transition: border-color .15s; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .btn { padding: 8px 16px; border: 1px solid var(--border2); background: transparent; color: var(--text); font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; transition: all .15s; }
  .btn:hover { background: var(--surface2); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #0d1117; }
  .btn-accent:hover { opacity: .9; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-danger { border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red-dim); }
  .btn-icon { padding: 4px 6px; border: none; background: none; color: var(--muted); cursor: pointer; font-size: 15px; }
  .btn-icon:hover { color: var(--red); }
  .word-tag { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 20px; font-size: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .word-tag.said { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .word-tag select { width: auto; padding: 0 4px; font-size: 11px; border: none; background: transparent; color: var(--muted); }
  .flex-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .odds-badge { font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
  .odds-lock, .odds-likely { background: var(--blue-dim); color: var(--blue); }
  .odds-even { background: var(--green-dim); color: var(--green); }
  .odds-unlikely { background: rgba(240,192,64,.15); color: var(--accent); }
  .odds-long, .odds-miracle { background: var(--red-dim); color: var(--red); }
  .stat { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
  .stat-num { font-size: 26px; font-weight: 700; color: var(--accent); }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .player-bet-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 10px; }
  .player-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .lb-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-size: 11px; color: var(--muted); width: 18px; text-align: right; }
  .lb-name { flex: 1; font-weight: 500; }
  .lb-net { font-weight: 700; }
  .pos { color: var(--green); } .neg { color: var(--red); }
  .bet-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .bet-item:last-child { border-bottom: none; }
  .bet-desc { font-size: 13px; flex: 1; }
  .bet-desc em { color: var(--accent); font-style: normal; font-weight: 600; }
  .word-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); cursor: pointer; transition: all .15s; }
  .word-btn:hover { border-color: var(--accent); color: var(--accent); }
  .word-btn.said { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .tag-input-row { display: flex; gap: 8px; margin-top: 8px; }
  .tag-input-row input { flex: 1; }
  .section { display: none; } .section.active { display: block; }
  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 32px 0; }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border2); color: var(--text); font-size: 13px; padding: 10px 20px; border-radius: 30px; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 999; white-space: nowrap; }
  #toast.show { opacity: 1; }
  .check-word { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
  .check-word input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  @media(max-width:480px) { .grid2, .grid3 { grid-template-columns: 1fr; } .tab { font-size: 11px; } header { padding: 0 12px; } }
</style>
</head>
<body>
<header>
  <div class="logo">🚢 <span>Cruise</span> Word Bet</div>
  <div class="conn-badge">
    <div class="live-dot" id="dot" style="background:var(--muted);box-shadow:none"></div>
    <span id="conn-text">Connecting…</span>
  </div>
</header>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('setup')">⚙ Setup</button>
    <button class="tab" onclick="showTab('betting')">🎰 Bet</button>
    <button class="tab" onclick="showTab('track')">✅ Track</button>
    <button class="tab" onclick="showTab('results')">🏆 Results</button>
  </div>
  <div id="setup" class="section active">
    <div class="card">
      <div class="card-title">Add a player</div>
      <div class="grid2" style="margin-bottom:12px">
        <div><label>Name</label><input type="text" id="new-name" placeholder="e.g. Jake"/></div>
        <div><label>Color</label>
          <select id="new-color">
            <option value="blue">🔵 Blue</option><option value="teal">🟢 Teal</option>
            <option value="purple">🟣 Purple</option><option value="coral">🟠 Coral</option>
            <option value="gold">🟡 Gold</option><option value="pink">🩷 Pink</option>
          </select>
        </div>
      </div>
      <div style="margin-bottom:12px">
        <label>Their words (press Enter to add each one)</label>
        <div class="tag-input-row">
          <input type="text" id="new-word-input" placeholder="Type a word…" onkeydown="if(event.key==='Enter'){event.preventDefault();addWordToNew()}"/>
          <button class="btn btn-sm" onclick="addWordToNew()">Add</button>
        </div>
        <div class="flex-wrap" id="new-words-list" style="margin-top:10px"></div>
      </div>
      <div style="display:flex;justify-content:flex-end">
        <button class="btn btn-accent" onclick="addPlayer()">Add player →</button>
      </div>
    </div>
    <div id="players-list"></div>
    <div style="margin-top:16px;text-align:right">
      <button class="btn btn-danger btn-sm" onclick="confirmReset()">Reset entire game</button>
    </div>
  </div>
  <div id="betting" class="section">
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Your info</div>
      <div class="grid2">
        <div><label>Your name</label><input type="text" id="bettor-name" placeholder="Enter your name"/></div>
        <div><label>Chips per bet</label><input type="number" id="bet-amount" value="10" min="1"/></div>
      </div>
    </div>
    <div id="bet-targets"></div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end">
      <button class="btn btn-accent" onclick="placeBets()">Place selected bets →</button>
    </div>
  </div>
  <div id="track" class="section">
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Tap a word when you hear it on the cruise. Bets settle instantly for everyone.</p>
    <div id="track-list"></div>
  </div>
  <div id="results" class="section">
    <div class="grid3" id="summary-stats" style="margin-bottom:20px"></div>
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">🏆 Leaderboard</div>
      <div id="leaderboard"></div>
    </div>
    <div class="card">
      <div class="card-title">All bets</div>
      <div id="all-bets-list"></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
const socket = io();
let state = { players: [], bets: [] };
let newWords = [];
socket.on('connect', () => { document.getElementById('dot').style.cssText = 'background:var(--green);box-shadow:0 0 6px var(--green)'; document.getElementById('conn-text').textContent = 'Live'; });
socket.on('disconnect', () => { document.getElementById('dot').style.cssText = 'background:var(--red);box-shadow:none'; document.getElementById('conn-text').textContent = 'Disconnected'; });
socket.on('state', (s) => { state = s; renderAll(); });
const ODDS = [
  { label:'Lock', value:'1/5', mult:1.2, cls:'odds-lock' },
  { label:'Likely', value:'1/2', mult:1.5, cls:'odds-likely' },
  { label:'Even', value:'1/1', mult:2, cls:'odds-even' },
  { label:'Unlikely', value:'2/1', mult:3, cls:'odds-unlikely' },
  { label:'Long shot', value:'5/1', mult:6, cls:'odds-long' },
  { label:'Miracle', value:'10/1', mult:11, cls:'odds-miracle' },
];
const COLORS = {
  blue:{bg:'#1c2d3f',color:'#58a6ff'}, teal:{bg:'#0e2d22',color:'#3fb950'},
  purple:{bg:'#2a1f4a',color:'#c084fc'}, coral:{bg:'#3a1a10',color:'#f97316'},
  gold:{bg:'#2d2100',color:'#f0c040'}, pink:{bg:'#3a1028',color:'#f472b6'},
};
function initials(n){ return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function oddsObj(v){ return ODDS.find(o=>o.value===v)||ODDS[2]; }
function showTab(t) {
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.querySelector('[onclick="showTab(\''+t+'\')"]').classList.add('active');
  document.getElementById(t).classList.add('active');
}
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2600); }
function addWordToNew() {
  const inp=document.getElementById('new-word-input');
  const w=inp.value.trim().replace(/,/g,'');
  if(!w) return;
  if(!newWords.find(x=>x.word.toLowerCase()===w.toLowerCase())) newWords.push({word:w,odds:ODDS[2]});
  inp.value=''; renderNewWordList();
}
function removeNewWord(i){ newWords.splice(i,1); renderNewWordList(); }
function setNewWordOdds(i,v){ newWords[i].odds=oddsObj(v); renderNewWordList(); }
function renderNewWordList() {
  document.getElementById('new-words-list').innerHTML=newWords.map((x,i)=>
    '<span class="word-tag">'+x.word+
    '<select onchange="setNewWordOdds('+i+',this.value)">'+
    ODDS.map(o=>'<option value="'+o.value+'"'+(x.odds.value===o.value?' selected':'')+'>'+o.label+' ('+o.value+')</option>').join('')+
    '</select><button class="btn-icon" onclick="removeNewWord('+i+')">×</button></span>'
  ).join('');
}
function addPlayer() {
  const name=document.getElementById('new-name').value.trim();
  const color=document.getElementById('new-color').value;
  if(!name){ toast('Enter a name first'); return; }
  if(!newWords.length){ toast('Add at least one word'); return; }
  socket.emit('addPlayer',{name,color,words:newWords.map(w=>({...w}))});
  newWords=[]; document.getElementById('new-name').value=''; document.getElementById('new-words-list').innerHTML='';
  toast(name+' added!');
}
function removePlayer(id){ if(confirm('Remove this player?')) socket.emit('removePlayer',id); }
function confirmReset(){ if(confirm('Reset the entire game?')) socket.emit('resetGame'); }
function renderSetup() {
  const el=document.getElementById('players-list');
  if(!state.players.length){ el.innerHTML='<div class="empty"><div class="empty-icon">👤</div>No players yet</div>'; return; }
  el.innerHTML=state.players.map(p=>{
    const cm=COLORS[p.color]||COLORS.blue;
    return '<div class="card" style="padding:14px 18px">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
      '<div style="display:flex;align-items:center;gap:10px">'+
      '<div class="avatar" style="background:'+cm.bg+';color:'+cm.color+'">'+initials(p.name)+'</div>'+
      '<strong>'+p.name+'</strong></div>'+
      '<button class="btn btn-sm btn-danger" onclick="removePlayer('+p.id+')">Remove</button></div>'+
      '<div class="flex-wrap">'+p.words.map(w=>
        '<span class="word-tag'+(w.said?' said':'')+'">'+
        (w.said?'✓ ':'')+w.word+
        '<span class="odds-badge '+(w.odds.cls||oddsObj(w.odds.value).cls)+'">'+w.odds.value+'</span></span>'
      ).join('')+'</div></div>';
  }).join('');
}
function renderBetting() {
  const el=document.getElementById('bet-targets');
  if(!state.players.length){ el.innerHTML='<div class="empty"><div class="empty-icon">⚙️</div>Add players in Setup first</div>'; return; }
  el.innerHTML=state.players.map(p=>{
    const cm=COLORS[p.color]||COLORS.blue;
    return '<div class="player-bet-card">'+
      '<div class="player-header">'+
      '<div class="avatar" style="background:'+cm.bg+';color:'+cm.color+'">'+initials(p.name)+'</div>'+
      '<strong>'+p.name+'</strong>'+
      '<span style="font-size:12px;color:var(--muted);margin-left:auto">'+p.words.filter(w=>w.said).length+'/'+p.words.length+' said</span></div>'+
      '<div class="flex-wrap">'+p.words.map(w=>{
        const o=oddsObj(w.odds.value);
        const key='cb_'+p.id+'__'+w.word.replace(/\s/g,'_');
        return '<label class="check-word">'+
          '<input type="checkbox" id="'+key+'"'+(w.said?' disabled':'')+'>'+
          '<span class="word-btn'+(w.said?' said':'')+'">'+
          (w.said?'✓ ':'')+w.word+' <span class="odds-badge '+o.cls+'">'+o.value+'</span></span></label>';
      }).join('')+'</div></div>';
  }).join('');
}
function placeBets() {
  const bettor=document.getElementById('bettor-name').value.trim();
  const amount=parseFloat(document.getElementById('bet-amount').value)||10;
  if(!bettor){ toast('Enter your name first'); return; }
  let count=0;
  state.players.forEach(p=>{ p.words.forEach(w=>{
    if(w.said) return;
    const cb=document.getElementById('cb_'+p.id+'__'+w.word.replace(/\s/g,'_'));
    if(cb&&cb.checked){ socket.emit('placeBet',{bettor,targetId:p.id,targetName:p.name,word:w.word,odds:oddsObj(w.odds.value),amount}); cb.checked=false; count++; }
  }); });
  if(!count){ toast('Check at least one word'); return; }
  toast(count+' bet'+(count>1?'s':'')+' placed! 🎰');
}
function renderTrack() {
  const el=document.getElementById('track-list');
  if(!state.players.length){ el.innerHTML='<div class="empty"><div class="empty-icon">✅</div>Add players first</div>'; return; }
  el.innerHTML=state.players.map(p=>{
    const cm=COLORS[p.color]||COLORS.blue;
    return '<div class="card">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'+
      '<div class="avatar" style="background:'+cm.bg+';color:'+cm.color+'">'+initials(p.name)+'</div>'+
      '<strong>'+p.name+'</strong>'+
      '<span style="font-size:12px;color:var(--muted);margin-left:auto">'+p.words.filter(w=>w.said).length+'/'+p.words.length+'</span></div>'+
      '<div class="flex-wrap">'+p.words.map((w,wi)=>
        '<button class="word-btn'+(w.said?' said':'')+'" onclick="toggleWord('+p.id+','+wi+')">'+
        (w.said?'✓ ':'')+w.word+'</button>'
      ).join('')+'</div></div>';
  }).join('');
}
function toggleWord(pid,wi){ socket.emit('toggleWord',{playerId:pid,wordIndex:wi}); }
function renderResults() {
  const totalBets=state.bets.length, settled=state.bets.filter(b=>b.settled).length, totalChips=state.bets.reduce((s,b)=>s+b.amount,0);
  document.getElementById('summary-stats').innerHTML=
    '<div class="stat"><div class="stat-num">'+totalBets+'</div><div class="stat-lbl">Total bets</div></div>'+
    '<div class="stat"><div class="stat-num">'+settled+'</div><div class="stat-lbl">Settled</div></div>'+
    '<div class="stat"><div class="stat-num">'+totalChips+'</div><div class="stat-lbl">Chips wagered</div></div>';
  const map={};
  state.bets.forEach(b=>{ if(!map[b.bettor]) map[b.bettor]={name:b.bettor,spent:0,won:0,pending:0}; map[b.bettor].spent+=b.amount; if(b.settled&&b.won) map[b.bettor].won+=Math.round(b.amount*b.odds.mult); if(!b.settled) map[b.bettor].pending+=b.amount; });
  const sorted=Object.values(map).sort((a,b)=>(b.won-b.spent)-(a.won-a.spent));
  const lb=document.getElementById('leaderboard');
  if(!sorted.length){ lb.innerHTML='<div class="empty" style="padding:1rem">No bets yet</div>'; }
  else lb.innerHTML=sorted.map((x,i)=>{ const net=x.won-x.spent; return '<div class="lb-row"><span class="lb-rank">'+(i+1)+'</span><span class="lb-name">'+x.name+'</span>'+(x.pending>0?'<span style="font-size:12px;color:var(--muted)">'+x.pending+' pending</span>':'')+'<span class="lb-net '+(net>0?'pos':net<0?'neg':'')+'">'+( net>0?'+':'')+net+' chips</span></div>'; }).join('');
  const allBets=document.getElementById('all-bets-list');
  if(!state.bets.length){ allBets.innerHTML='<div class="empty" style="padding:1rem">No bets yet</div>'; return; }
  allBets.innerHTML=[...state.bets].reverse().map(b=>{ const status=b.settled?(b.won?'<span style="color:var(--green);font-weight:700">+'+Math.round(b.amount*b.odds.mult)+' ✓</span>':'<span style="color:var(--red)">Lost</span>'):'<span style="color:var(--muted)">Pending</span>'; return '<div class="bet-item"><div class="bet-desc">'+b.bettor+' → <em>'+b.targetName+'</em> says "<em>'+b.word+'</em>" · '+b.odds.value+' · '+b.amount+' chips</div>'+status+'</div>'; }).join('');
}
function renderAll(){ renderSetup(); renderBetting(); renderTrack(); renderResults(); }
</script>
</body>
</html>
